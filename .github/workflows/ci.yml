name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Detect which modules have changed to run only relevant builds
  filter-changes:
    runs-on: ubuntu-latest
    outputs:
      # Promotes step output (string JSON array) to job level so it's accessible to 'build' job
      modules: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Filter changes
        uses: dorny/paths-filter@v4
        id: filter # ID used to reference this step's outputs (e.g., steps.filter.outputs.changes)
        with:
          filters: |
            json-converter:
              - 'json-converter/**'
              - 'pom.xml'
              - '.github/workflows/ci.yml'
              - 'checkstyl*.xml'
            bom:
              - 'bom/**'
              - 'pom.xml'
              - '.github/workflows/ci.yml'
              - 'checkstyl*.xml'

  build:
    needs: filter-changes # Declares dependency to access 'filter-changes' job outputs
    # Only run if the 'modules' array is not empty
    if: ${{ needs.filter-changes.outputs.modules != '[]' && needs.filter-changes.outputs.modules != '' }}
    strategy:
      fail-fast: false
      matrix:
        # fromJSON parses the string array from the previous job into a usable matrix object
        module: ${{ fromJSON(needs.filter-changes.outputs.modules) }}
    runs-on: ubuntu-latest
    # matrix.module contains the current value from the matrix iteration (e.g., 'json-converter')
    name: Build ${{ matrix.module }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn -pl ${{ matrix.module }} -am clean test
